name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to (re-)release
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          name="file-rescue-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          strip "target/${{ matrix.target }}/release/rescue"
          cp "target/${{ matrix.target }}/release/rescue" "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          $name = "file-rescue-$tag-${{ matrix.target }}"
          $staging = "dist/$name"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rescue.exe" "$staging/"
          Copy-Item README.md,LICENSE "$staging/"
          Compress-Archive -Path $staging -DestinationPath "dist/$name.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/*
