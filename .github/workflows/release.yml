name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v0.1.0 (the tag is created by this workflow)"
        required: true
      ref:
        description: "Commit/branch to tag"
        required: false
        default: main

env:
  CARGO_TERM_COLOR: always

jobs:
  # Resolves the tag for this run and, for manual dispatches, creates and
  # pushes it — the GitHub web UI cannot create a tag without also
  # creating a release, which then conflicts with the one this workflow
  # publishes below, so tag creation lives here instead.
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Validate version input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must look like vX.Y.Z, got '${{ inputs.version }}'"
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Resolve tag
        id: resolve
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          tag="${{ steps.resolve.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null; then
            echo "tag ${tag} already exists on origin, reusing it"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          name="file-rescue-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          strip "target/${{ matrix.target }}/release/rescue"
          cp "target/${{ matrix.target }}/release/rescue" "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $name = "file-rescue-$tag-${{ matrix.target }}"
          $staging = "dist/$name"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rescue.exe" "$staging/"
          Copy-Item README.md,LICENSE "$staging/"
          Compress-Archive -Path $staging -DestinationPath "dist/$name.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: dist/*
